version: "3.8"

services:
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Berlin
    volumes:
      - heimdall_config:/config
    ports:
      - ${HTTP_PORT}:80
      - ${HTTPS_PORT}:443
    networks:
      - default
      - traefik-public
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.heimdall.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.heimdall.entrypoints=websecure"
        - "traefik.http.routers.heimdall.tls.certresolver=desecresolver"
        - "traefik.http.services.heimdall.loadbalancer.server.port=80"

volumes:
  heimdall_config:
    name: ${VOLUME_NAME}

networks:
  traefik-public:
    external: true
