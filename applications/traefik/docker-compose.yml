version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    command:
      - "--api.dashboard=true"
      - "--log.level=INFO"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--providers.file.directory=/traefik-dynamic"
      - "--providers.file.watch=true"
      - "--serverstransport.insecureSkipVerify=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.desecresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.desecresolver.acme.dnschallenge.provider=desec"
      - "--certificatesresolvers.desecresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.desecresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.desecresolver.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    environment:
      - TZ=Europe/Berlin
      - DESEC_TOKEN_FILE=/run/secrets/traefik_desec_token
    secrets:
      - traefik_desec_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
      - ${DYNAMIC_CONFIG_PATH}:/traefik-dynamic
    networks:
      - traefik-public
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`${DASHBOARD_HOST}`)"
        - "traefik.http.routers.api.service=api@internal"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls.certresolver=desecresolver"
        - "traefik.http.routers.api.tls.domains[0].main=${TLS_DOMAIN}"
        - "traefik.http.routers.api.tls.domains[0].sans=*.${TLS_DOMAIN}"
        - "docker-volume-backup.stop-during-backup=traefik"

volumes:
  traefik-certificates:
    external: true
    name: ${VOLUME_NAME_CERTIFICATES}

networks:
  traefik-public:
    external: true

secrets:
  traefik_desec_token:
    external: true
