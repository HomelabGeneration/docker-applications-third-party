version: "3.8"

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.125.1
    ports:
      - ${HTTP_PORT}:8428
      - ${INFLUX_PORT}:8089
      - ${INFLUX_PORT}:8089/udp
    volumes:
      - data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
      - "--influxListenAddr=:8089"
    networks:
      - default
      - traefik-public
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.victoriametrics.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.victoriametrics.entrypoints=websecure"
        - "traefik.http.routers.victoriametrics.tls.certresolver=desecresolver"
        - "traefik.http.services.victoriametrics.loadbalancer.server.port=8428"
        - "docker-volume-backup.stop-during-backup=${VICTORIAMETRICS_BACKUP_SERVICE_LABEL}"

volumes:
  data:
    external: true
    name: ${VOLUME_NAME}

networks:
  traefik-public:
    external: true
